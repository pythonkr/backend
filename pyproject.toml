[project]
name = "backend"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = "==3.12.*"
dependencies = [
    "argon2-cffi>=23.1.0",
    "awslambdaric>=3.0.2",
    "django>=5.2",
    "django-constance>=4.3.2",
    "django-cors-headers>=4.7.0",
    "django-environ>=0.12.0",
    "django-extensions>=3.2.3",
    "django-filter>=25.1",
    "django-modeltranslation>=0.19.13",
    "django-picklefield>=3.3",
    "django-simple-history>=3.8.0",
    "django-storages[s3]>=1.14.6",
    "djangorestframework>=3.16.0",
    "drf-spectacular>=0.28.0",
    "drf-standardized-errors[openapi]>=0.14.1",
    "httpx>=0.28.1",
    "packaging>=24.2",
    "psycopg[binary]>=3.2.6",
    "sentry-sdk[django]>=2.25.1",
    "setuptools>=78.1.0",
    "zappa>=0.59.0",
    "zappa-django-utils>=0.4.1",
]

[dependency-groups]
dev = [
    "boto3-stubs[essential,s3,ssm]>=1.37.28",
    "django-stubs[compatible-mypy]>=5.1.3",
    "djangorestframework-stubs[compatible-mypy]>=3.15.3",
    "ipython>=9.0.2",
    "pre-commit>=4.2.0",
]
deployment = [
    "boto3>=1.37.28",
    "django>=5.2",
    "django-environ>=0.12.0",
    "django-storages[s3]>=1.14.6",
    "djangorestframework>=3.16.0",
    "setuptools>=78.1.0",
    "zappa>=0.59.0",
]

[tool.uv]
package = false
default-groups = ["dev", "deployment"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.isort]
profile = "black"
line_length = 120
known_third_party = ["rest_framework"]

[tool.django-stubs]
django_settings_module = "core.settings"

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
fixable = ["ALL"]
