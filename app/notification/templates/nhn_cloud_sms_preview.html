<html lang="ko-kr">

<head>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
  <style>
    body {
      height: initial;
      min-height: initial;
      max-height: initial;
      margin: 0;
      padding: 0;
      font-family: 'Roboto', sans-serif;
      user-select: none;
    }

    .toast-sms-main {
      background-color: #ededed;
      min-height: 50rem;
      padding: 0.5rem;
      aspect-ratio: 1/2;
    }

    .toast-sms-main * {
      font-size: 0.85rem;
    }

    .toast-sms-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
      padding: 1rem 0 1.5rem 0;
      color: #555;
    }

    .toast-sms-avatar {
      width: 3rem;
      height: 3rem;
      border-radius: 50%;
      background-color: #c0c0c0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .toast-sms-avatar > svg {
      width: 2rem;
      height: 2rem;
      fill: #fff;
    }

    .toast-sms-from {
      font-weight: bold;
      color: #222;
    }

    .toast-sms-bubble-row {
      display: flex;
      justify-content: flex-start;
      padding: 0 0.5rem;
    }

    .toast-sms-bubble {
      max-width: 18rem;
      background-color: #ffffff;
      color: #111;
      padding: 0.75rem 1rem;
      border-radius: 1rem 1rem 1rem 0.25rem;
      box-shadow: 0 1px 1px rgba(0, 0, 0, 0.05);
    }

    .toast-sms-title {
      font-weight: bold;
      margin: 0 0 0.5rem 0;
      font-size: 0.95rem;
    }

    .toast-sms-text {
      overflow-wrap: break-word;
      white-space: pre-wrap;
      word-break: keep-all;
      line-height: 1.4;
    }

    .toast-sms-time {
      margin-top: 0.5rem;
      font-size: 0.7rem;
      color: #999;
    }
  </style>
</head>

<body>
  <main class="toast-sms-main">
    <header class="toast-sms-header">
      <div class="toast-sms-avatar">
        <svg focusable="false" viewBox="2 2 20 20">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2m0 4c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6m0 14c-2.03 0-4.43-.82-6.14-2.88C7.55 15.8 9.68 15 12 15s4.45.8 6.14 2.12C16.43 19.18 14.03 20 12 20" />
        </svg>
      </div>
      <div class="toast-sms-from">PyConKR</div>
    </header>
    <div class="toast-sms-bubble-row">
      <div class="toast-sms-bubble">
        {% if title %}
          <p class="toast-sms-title">{{ title }}</p>
        {% endif %}
        <span class="toast-sms-text">{{ body }}</span>
        <div class="toast-sms-time">오후 3:30</div>
      </div>
    </div>
  </main>
</body>

</html>
