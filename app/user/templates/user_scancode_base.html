<!DOCTYPE html>
<html lang="ko-kr">

<head>
  <meta charSet="utf-8" />
  <base href="/" />
  <meta name="theme-color" content="#fff" />
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#fff" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#fff" />
  <meta name="viewport" content="width=device-width,
    height=device-height,
    target-densitydpi=device-dpi,
    initial-scale=1.0,
    minimum-scale=1.0,
    maximum-scale=1.0,
    user-scalable=0,
    user-scalable=no,
    shrink-to-fit=no" />
  <title>PyCon Korea</title>

  <script src="https://cdn.rawgit.com/davidshimjs/qrcodejs/gh-pages/qrcode.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      padding: 0;
      margin: 0;

      -webkit-user-drag: none;
      /* Safari */
      -khtml-user-drag: none;
      /* Konqueror HTML */
      -moz-user-drag: none;
      /* Old versions of Firefox */
      -o-user-drag: none;
      /* Old versions of Opera */
      user-drag: none;
      /* Non-prefixed version */
    }

    html,
    body {
      overscroll-behavior: none;

      -webkit-touch-callout: none;
      /* iOS Safari */
      -webkit-user-select: none;
      /* Safari */
      -khtml-user-select: none;
      /* Konqueror HTML */
      -moz-user-select: none;
      /* Old versions of Firefox */
      -ms-user-select: none;
      /* Internet Explorer/Edge */
      user-select: none;
      /* Non-prefixed version */

      background-color: #ccc;
      font-family:
        Pretendard, Open Sans, arial, Apple SD Gothic Neo, Noto Sans CJK KR,
        본고딕, KoPubDotum, 나눔바른고딕, 나눔고딕, NanumGothic,
        맑은고딕, Malgun Gothic, sans-serif !important;
      word-break: keep-all;
      overflow-wrap: break-all;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;

      width: 100%;
      height: 50px;

      background-color: #fff;
      box-shadow: 0 3px 6px rgba(0, 0, 0, 0.16), 0 3px 6px rgba(0, 0, 0, 0.23);

      display: flex;
      justify-content: center;
      align-items: center;
    }

    section {
      position: fixed;
      top: 50px;
      left: 0;

      width: 100%;
      height: calc(100% - 50px);

      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;

      overflow-x: hidden;
      overflow-y: auto;
    }

    aside {
      width: 95%;
      max-width: 600px;
      height: max-content;
      margin: 1rem 1.5rem;
      padding: 1.5rem;
      border-radius: 1rem;

      background-color: #fff;
      box-shadow: 0 3px 6px rgba(0, 0, 0, 0.16), 0 3px 6px rgba(0, 0, 0, 0.23);

      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
    }

    .logo {
      width: 36px;
      height: 36px;
      display: block;
    }

    small {
      font-size: 0.75rem;
      color: #555;
    }

    ul,
    li {
      margin: 0;
      padding: 0;
      font-size: 0.55rem;
      list-style: none;
      line-height: 1.6;
    }

    hr {
      width: 100%;
    }

    table {
      width: 100%;
      font-size: 0.8em;
      border-spacing: 0;
      table-layout: auto;
    }

    tr {
      min-height: 1.25rem;
      height: 1.25rem;
    }

    td {
      width: auto;
    }

    td.min {
      padding: 0 0.5rem;
      width: 1%;
      white-space: nowrap;
    }

    .content-container {
      width: 100%;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 1rem;
    }

    .order-info-list-container {
      width: 100%;
      margin-top: 1rem;
      margin-bottom: 1rem;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      gap: 0.5rem;
    }

    .order-info-list-item {
      flex-grow: 1;
      width: 100%;
      padding: 0.5rem;

      font-size: 0.8em;
      border-bottom: 1px solid #ddd;
    }

    .order-info-list-item:last-child {
      border-bottom: none;
    }

    .order-info-list-item-content {
      padding: 0.5rem;
    }

    .order-item-product-table {
      margin-top: 0.5rem;
    }

    .refunded {
      text-decoration: line-through;
    }

    .qrcode-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 1rem;
      margin: 1rem;

      border: 2px solid #444;
      border-radius: 1rem;
    }

    .qrcode-container small {
      margin-top: 0.5rem;
      font-size: 0.6rem;
      color: #555;
    }

    .notice {
      width: 95%;
      max-width: 600px;
      margin: 0 1.5rem;
      padding: 0.5rem;

      color: #555;
      font-size: 0.8rem;
    }

    li::before {
      content: "- ";
    }
  </style>
</head>

    <div class="notice">
      <strong>안내</strong>
      <ul>
        <li>QR 코드가 타인에게 노출되지 않도록 주의해주세요!</li>
        <li>티셔츠, 티켓을 포함한 주문 상품의 양도는 불가능하며, 양도로 인한 문제 발생은 구매자에게 귀책사유가 있습니다.</li>
        <li>자세한 주문 정보는 <a href="https://pycon.kr">파이콘 한국</a>의 구매 내역에서 조회할 수 있습니다.</li>
      </ul>
    </div>
  </section>
</body>

</html>
